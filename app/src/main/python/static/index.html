<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vamus</title>
    <link rel="stylesheet" href="css/app.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel" id="sidebar">
            <a href="#/" class="sidebar-logo" onclick="navigate('/')">
                <svg class="logo-icon" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                <span class="logo-text">Vamus</span>
            </a>
            <nav class="sidebar-nav">
                <a href="#/" class="nav-item active" data-route="/" onclick="navigate('/')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                    <span class="nav-label">Home</span>
                </a>
                <a href="#/search" class="nav-item" data-route="/search" onclick="navigate('/search')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <span class="nav-label">Search</span>
                </a>
                <a href="#/library" class="nav-item" data-route="/library" onclick="navigate('/library')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                    <span class="nav-label">Library</span>
                </a>
                <a href="#/liked" class="nav-item" data-route="/liked" onclick="navigate('/liked')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                    <span class="nav-label">Liked</span>
                </a>
                <a href="#/settings" class="nav-item" data-route="/settings" onclick="navigate('/settings')">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                    <span class="nav-label">Settings</span>
                </a>
            </nav>
            <div class="sidebar-library">
                <div class="library-header">
                    <span>Playlists</span>
                    <button class="btn-icon add-btn" onclick="showCreatePlaylist()" title="Create playlist">+</button>
                </div>
                <div class="playlist-list" id="sidebar-playlists"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="main-content">
            <!-- Search bar (desktop) -->
            <div class="top-bar" id="top-bar">
                <form class="search-form" onsubmit="handleSearch(event)">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="search-input" placeholder="Search songs, artists..." autocomplete="off">
                    <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
                </form>
            </div>
            <!-- Page content injected here -->
            <div id="page-content"></div>
        </main>

        <!-- Player bar (bottom) -->
        <div class="player-bar glass-panel" id="player-bar" style="display:none">
            <!-- Sleek progress indicator for mobile mini player -->
            <div class="mini-player-progress-container" style="display:none;">
                <div class="mini-player-progress-fill" id="mini-progress-fill"></div>
            </div>
            <div class="player-track" id="player-track-info">
                <img id="player-thumb" class="player-thumb" src="" alt="">
                <div class="player-track-info">
                    <div class="player-track-name" id="player-track-name"></div>
                    <div class="player-track-artist" id="player-track-artist"></div>
                </div>
                <button class="btn-icon like-btn" id="player-like-btn" onclick="toggleLikeCurrent()"></button>
            </div>
            <div class="player-center">
                <div class="player-buttons">
                    <button class="btn-icon" id="shuffle-btn" onclick="toggleShuffle()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
                    </button>
                    <button class="btn-icon" onclick="playPrev()">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2"/></svg>
                    </button>
                    <button class="btn-icon play-btn" id="play-pause-btn" onclick="togglePlay()">
                        <svg id="play-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>
                        <svg id="pause-icon" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    <button class="btn-icon" onclick="playNext()">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2"/></svg>
                    </button>
                    <button class="btn-icon" id="repeat-btn" onclick="cycleRepeat()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>
                    </button>
                </div>
                <div class="player-progress">
                    <span class="time-label" id="current-time">0:00</span>
                    <div class="progress-track" id="progress-track" onclick="seekTo(event)">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <span class="time-label" id="total-time">0:00</span>
                </div>
            </div>
            <div class="player-right">
                <button class="btn-icon" id="lyrics-btn" onclick="toggleLyrics()" title="Lyrics">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h10M4 18h14"/></svg>
                </button>
                <button class="btn-icon volume-btn" id="volume-btn" onclick="toggleMute()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
                </button>
                <input type="range" class="volume-input" id="volume-slider" min="0" max="100" value="100" oninput="setVolume(this.value)">
            </div>
        </div>

        <!-- Mobile bottom nav -->
        <nav class="bottom-nav" id="bottom-nav">
            <a class="bottom-nav-item active" data-route="/" onclick="navigate('/')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                <span>Home</span>
            </a>
            <a class="bottom-nav-item" data-route="/search" onclick="navigate('/search')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <span>Search</span>
            </a>
            <a class="bottom-nav-item" data-route="/library" onclick="navigate('/library')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                <span>Library</span>
            </a>
            <a class="bottom-nav-item" data-route="/settings" onclick="navigate('/settings')">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
        </nav>
    </div>

    <!-- Lyrics overlay -->
    <div class="lyrics-overlay" id="lyrics-overlay" style="display:none" onclick="toggleLyrics()">
        <button class="lyrics-close-btn" onclick="event.stopPropagation(); toggleLyrics()">✕</button>
        <div class="lyrics-container" id="lyrics-container" onclick="event.stopPropagation()"></div>
    </div>

    <!-- Fullscreen mobile player -->
    <div class="mobile-player-overlay" id="mobile-player-overlay" style="display:none"></div>

    <!-- Modal overlay for playlists -->
    <div class="modal-overlay" id="modal-overlay" style="display:none" onclick="closeModal()"></div>

    <audio id="audio-player" preload="auto"></audio>

    <script src="js/store.js"></script>
    <script src="js/player.js"></script>
    <script src="js/router.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>
    <script src="js/debug.js"></script>
</body>
</html>
